<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روابط التواصل الاجتماعي</title>
    <link rel="stylesheet" href="style.css">
    <!-- استيراد خط Tajawal من Google Fonts للمظهر المودرن -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <!-- استيراد Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- قسم الهوية -->
        <header class="profile">
            <div class="avatar-container">
                <img src="https://via.placeholder.com/150" alt="صورة الحساب" class="avatar">
            </div>
            <h1 class="username">اسم الحساب</h1>
            <p class="description">تواصل معنا عبر منصاتنا الرسمية</p>
        </header>

        <!-- قسم الروابط -->
        <main class="links-container">
            <a href="https://facebook.com" target="_blank" class="link-card">
                <i class="fab fa-facebook-f"></i>
                <span>فيسبوك</span>
            </a>
            <a href="https://instagram.com" target="_blank" class="link-card">
                <i class="fab fa-instagram"></i>
                <span>انستغرام</span>
            </a>
            <a href="https://tiktok.com" target="_blank" class="link-card">
                <i class="fab fa-tiktok"></i>
                <span>تيك توك</span>
            </a>
            <a href="https://wa.me/yournumber" target="_blank" class="link-card">
                <i class="fab fa-whatsapp"></i>
                <span>واتساب</span>
            </a>
        </main>

        <!-- التذييل -->
        <footer class="footer">
            <p>© 2026 جميع الحقوق محفوظة</p>
        </footer>
    </div>
</body>
</html>
